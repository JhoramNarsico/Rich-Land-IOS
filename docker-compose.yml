services:
  db:
    image: mysql:8.0
    platform: linux/amd64
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-richland_inventory_db}
      MYSQL_USER: ${DB_USER:-user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      # Changed the default external port fallback from 3307 to 3308
      - "${DB_PORT_EXTERNAL:-3308}:3306" 

  web:
    build: .
    command: >
      sh -c "python richland_inventory/manage.py migrate &&
             python richland_inventory/manage.py collectstatic --no-input &&
             python richland_inventory/manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "${WEB_PORT:-8000}:8000"
    environment:
      - DEBUG=True
      - DB_NAME=${DB_NAME:-richland_inventory_db}
      - DB_USER=${DB_USER:-user}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_HOST=db
      - DB_PORT=3306
    depends_on:
      - db

  selenium:
    image: selenium/standalone-chrome:latest
    platform: linux/amd64
    shm_size: 2gb
    ports:
      - "4444:4444"
      - "7900:7900"

  tests:
    build: .
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - DB_NAME=${DB_NAME:-richland_inventory_db}
      - DB_USER=${DB_USER:-user}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_HOST=db
      - DB_PORT=3306
      - SELENIUM_URL=http://selenium:4444/wd/hub
      - WEB_URL=http://web:8000
    depends_on:
      - db
      - web
      - selenium
    command: >
      sh -c "pytest richland_inventory/inventory/tests_integration.py"

volumes:
  mysql_data: